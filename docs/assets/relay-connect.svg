<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="100" y1="30" x2="1510" y2="950" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06111D"/>
      <stop offset="1" stop-color="#050816"/>
    </linearGradient>
    <linearGradient id="panel3" x1="80" y1="70" x2="1500" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0C1428"/>
      <stop offset="1" stop-color="#09090B"/>
    </linearGradient>
    <filter id="shadow3" x="20" y="24" width="1560" height="936" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#020617" flood-opacity="0.44"/>
    </filter>
  </defs>

  <rect width="1600" height="980" fill="url(#bg3)"/>
  <g opacity="0.08">
    <path d="M0 150H1600" stroke="#94A3B8"/>
    <path d="M0 350H1600" stroke="#94A3B8"/>
    <path d="M0 550H1600" stroke="#94A3B8"/>
    <path d="M0 750H1600" stroke="#94A3B8"/>
    <path d="M230 0V980" stroke="#94A3B8"/>
    <path d="M490 0V980" stroke="#94A3B8"/>
    <path d="M750 0V980" stroke="#94A3B8"/>
    <path d="M1010 0V980" stroke="#94A3B8"/>
    <path d="M1270 0V980" stroke="#94A3B8"/>
  </g>

  <g filter="url(#shadow3)">
    <rect x="62" y="56" width="1476" height="868" rx="34" fill="url(#panel3)" stroke="#1F2937"/>
  </g>

  <rect x="62" y="56" width="1476" height="76" rx="34" fill="#09090B"/>
  <rect x="62" y="98" width="1476" height="34" fill="#09090B"/>
  <rect x="102" y="84" width="22" height="22" rx="6" fill="#111827" stroke="#27272A"/>
  <rect x="109" y="91" width="8" height="8" rx="2" fill="#F8FAFC"/>
  <text x="138" y="100" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700">Relay</text>
  <rect x="1336" y="80" width="168" height="34" rx="17" fill="#052E16" stroke="#10B981"/>
  <text x="1364" y="102" fill="#A7F3D0" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700">Bridge Runtime Ready</text>

  <text x="112" y="194" fill="#93C5FD" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" letter-spacing="1.2">RELAY CONNECT</text>
  <text x="112" y="238" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="36" font-weight="800">Plug Existing Agents Into Relay</text>
  <text x="112" y="274" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="15">
    Launch bridge mode once, then let JavaScript, TypeScript, Python, or cURL-based agents stream actions and poll controls.
  </text>

  <rect x="112" y="314" width="412" height="566" rx="24" fill="#0B1020" stroke="#1F2937"/>
  <text x="140" y="352" fill="#64748B" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" letter-spacing="1.1">SESSION SETUP</text>

  <text x="140" y="396" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700">AGENT NAME</text>
  <rect x="140" y="406" width="356" height="46" rx="14" fill="#111827" stroke="#334155"/>
  <text x="160" y="435" fill="#E5E7EB" font-family="JetBrains Mono, monospace" font-size="13">Support Triage Agent</text>

  <text x="140" y="486" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700">AGENT ID</text>
  <rect x="140" y="496" width="356" height="46" rx="14" fill="#111827" stroke="#334155"/>
  <text x="160" y="525" fill="#E5E7EB" font-family="JetBrains Mono, monospace" font-size="13">support-triage-agent</text>

  <text x="140" y="576" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700">TASK</text>
  <rect x="140" y="586" width="356" height="72" rx="14" fill="#111827" stroke="#334155"/>
  <text x="160" y="616" fill="#E5E7EB" font-family="JetBrains Mono, monospace" font-size="13">Review urgent support tickets and draft</text>
  <text x="160" y="640" fill="#E5E7EB" font-family="JetBrains Mono, monospace" font-size="13">a concise summary for the operator.</text>

  <text x="140" y="692" fill="#94A3B8" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700">BRIDGE PORT</text>
  <rect x="140" y="702" width="170" height="46" rx="14" fill="#111827" stroke="#334155"/>
  <text x="160" y="731" fill="#E5E7EB" font-family="JetBrains Mono, monospace" font-size="13">8787</text>

  <rect x="140" y="776" width="356" height="82" rx="18" fill="#0F172A" stroke="#1E293B"/>
  <text x="160" y="808" fill="#93C5FD" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700">Generated bridge URL</text>
  <text x="160" y="838" fill="#E5E7EB" font-family="JetBrains Mono, monospace" font-size="13">http://127.0.0.1:8787</text>

  <rect x="554" y="314" width="872" height="566" rx="24" fill="#0B1020" stroke="#1F2937"/>
  <text x="582" y="352" fill="#64748B" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" letter-spacing="1.1">INTEGRATION SNIPPETS</text>

  <rect x="582" y="378" width="816" height="140" rx="20" fill="#0F172A" stroke="#1E293B"/>
  <text x="608" y="412" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700">1. Launch Relay in bridge mode</text>
  <rect x="608" y="432" width="764" height="58" rx="14" fill="#020617" stroke="#1E293B"/>
  <text x="628" y="458" fill="#A7F3D0" font-family="JetBrains Mono, monospace" font-size="12">pnpm --filter @relay/relay-sdk relay-watch --bridge true --bridge-port 8787</text>
  <text x="628" y="480" fill="#A7F3D0" font-family="JetBrains Mono, monospace" font-size="12">  --task "Review the newest support tickets" --agent-id support-triage-agent</text>

  <rect x="582" y="540" width="396" height="166" rx="20" fill="#0F172A" stroke="#1E293B"/>
  <text x="608" y="574" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700">2. JavaScript helper client</text>
  <rect x="608" y="594" width="344" height="86" rx="14" fill="#020617" stroke="#1E293B"/>
  <text x="626" y="622" fill="#BFDBFE" font-family="JetBrains Mono, monospace" font-size="12">import { RelayBridgeClient } from '@relay/relay-sdk/bridge-client'</text>
  <text x="626" y="646" fill="#BFDBFE" font-family="JetBrains Mono, monospace" font-size="12">await client.logAction({ type: 'read', title: 'Classified tickets' })</text>
  <text x="626" y="670" fill="#BFDBFE" font-family="JetBrains Mono, monospace" font-size="12">const control = await client.getControl({ consumeRedirect: true })</text>

  <rect x="1002" y="540" width="396" height="166" rx="20" fill="#0F172A" stroke="#1E293B"/>
  <text x="1028" y="574" fill="#F8FAFC" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700">3. Python standard library</text>
  <rect x="1028" y="594" width="344" height="86" rx="14" fill="#020617" stroke="#1E293B"/>
  <text x="1046" y="622" fill="#FDE68A" font-family="JetBrains Mono, monospace" font-size="12">request = Request(f'{bridge}/action', data=payload.encode())</text>
  <text x="1046" y="646" fill="#FDE68A" font-family="JetBrains Mono, monospace" font-size="12">urlopen(request)</text>
  <text x="1046" y="670" fill="#FDE68A" font-family="JetBrains Mono, monospace" font-size="12">control = urlopen(f'{bridge}/control?consumeRedirect=true').read()</text>

  <rect x="582" y="728" width="816" height="124" rx="20" fill="#0F172A" stroke="#1E293B"/>
  <text x="608" y="762" fill="#64748B" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700">BRIDGE CONTRACT</text>
  <rect x="608" y="784" width="176" height="42" rx="14" fill="#082F49" stroke="#38BDF8"/>
  <text x="630" y="810" fill="#E0F2FE" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700">GET /health</text>
  <rect x="800" y="784" width="176" height="42" rx="14" fill="#082F49" stroke="#38BDF8"/>
  <text x="822" y="810" fill="#E0F2FE" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700">POST /action</text>
  <rect x="992" y="784" width="194" height="42" rx="14" fill="#082F49" stroke="#38BDF8"/>
  <text x="1014" y="810" fill="#E0F2FE" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700">GET /control</text>
  <rect x="1202" y="784" width="170" height="42" rx="14" fill="#082F49" stroke="#38BDF8"/>
  <text x="1224" y="810" fill="#E0F2FE" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700">POST /drift</text>
</svg>
